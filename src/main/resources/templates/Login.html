<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario para agregear un nuevo usuario</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    </head>

    <body class="bg-light d-flex align-items-center justify-content-center vh-100">

        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-4">

                    <h3 class="text-center mb-4 fw-bold text-primary">
                        Iniciar Sesión
                    </h3>

                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Credenciales incorrectas
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Sesión cerrada correctamente
                    </div>

                    <form method="POST" action="/Login">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="username" class="form-control rounded-3"
                                   placeholder="Ingresa tu email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" name="password" class="form-control rounded-3"
                                   placeholder="Ingresa tu contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-3 fw-semibold">
                            Ingresar
                        </button>

                    </form>

                </div>

            </div>
        </div>

    </body>
</html>
