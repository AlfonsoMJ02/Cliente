<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Perfil de Usuario</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    </head>

    <body class="bg-light">

        <div class="container py-5">


            <div class="text-center mb-5">
                <h2 class="fw-bold text-primary">
                    <i class="bi bi-person-circle"></i> Mi Perfil
                </h2>
            </div>


            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">

                    <div class="row">


                        <div class="col-md-3 text-center mb-4">
                            <img class="img-fluid rounded-circle border shadow"
                                 style="width:150px; height:150px; object-fit:cover;"
                                 th:src="${usuario.imagen != null} 
                                 ? 'data:image/png;base64,' + ${usuario.imagen} 
                                 : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'">

                            <h5 class="mt-3 fw-bold">
                                <span th:text="${usuario.nombre}"></span>
                            </h5>

                            <span class="badge bg-primary"
                                  th:text="${usuario.rol.nombre}"></span>
                        </div>

                        <div class="col-md-9">

                            <h4 class="fw-bold mb-3 text-secondary">
                                Información General
                            </h4>

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">Nombre completo</label>
                                    <div class="form-control bg-light">
                                        <span th:text="${usuario.nombre}"></span>
                                        <span th:text="${usuario.apellidoPaterno}"></span>
                                        <span th:text="${usuario.apellidoMaterno}"></span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">Usuario</label>
                                    <div class="form-control bg-light" th:text="${usuario.userName}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">Email</label>
                                    <div class="form-control bg-light" th:text="${usuario.email}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">Sexo</label>
                                    <div class="form-control bg-light" th:text="${usuario.sexo}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">Teléfono</label>
                                    <div class="form-control bg-light">
                                        <span th:text="${usuario.telefono}"></span> /
                                        <span th:text="${usuario.celular}"></span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">CURP</label>
                                    <div class="form-control bg-light" th:text="${usuario.curp}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="fw-semibold">Fecha de nacimiento</label>
                                    <div class="form-control bg-light" th:text="${usuario.fechaNacimiento}"></div>
                                </div>

                            </div>

                        </div>

                    </div>

                    <hr class="my-4">

                    <div>
                        <h4 class="fw-bold text-secondary mb-3">
                            <i class="bi bi-geo-alt-fill"></i> Direcciones
                        </h4>

                        <div th:if="${usuario.direcciones != null and !usuario.direcciones.isEmpty()}">

                            <div class="row">
                                <div class="col-md-6 mb-3"
                                     th:each="direccion : ${usuario.direcciones}">

                                    <div class="card border-0 shadow-sm rounded-3 h-100">
                                        <div class="card-body">

                                            <h6 class="fw-bold text-primary mb-2">
                                                <i class="bi bi-house-door-fill"></i>
                                                <span th:text="${direccion.calle}"></span>
                                            </h6>

                                            <p class="mb-1 small">
                                                <strong>No. Interior:</strong>
                                                <span th:text="${direccion.numeroInterior}"></span>
                                            </p>

                                            <p class="mb-1 small">
                                                <strong>No. Exterior:</strong>
                                                <span th:text="${direccion.numeroExterior}"></span>
                                            </p>

                                            <p class="mb-1 small">
                                                <strong>Colonia:</strong>
                                                <span th:text="${direccion.colonia.nombre}"></span>
                                            </p>

                                            <p class="mb-1 small">
                                                <strong>Municipio:</strong>
                                                <span th:text="${direccion.colonia.municipio.nombre}"></span>
                                            </p>

                                            <p class="mb-1 small">
                                                <strong>Estado:</strong>
                                                <span th:text="${direccion.colonia.municipio.estado.nombre}"></span>
                                            </p>

                                            <p class="mb-0 small">
                                                <strong>País:</strong>
                                                <span th:text="${direccion.colonia.municipio.estado.pais.nombre}"></span>
                                            </p>

                                        </div>
                                    </div>

                                </div>
                            </div>

                        </div>

                        <div th:if="${usuario.direcciones == null or usuario.direcciones.isEmpty()}"
                             class="alert alert-secondary text-center">
                            <i class="bi bi-info-circle"></i>
                            No tienes direcciones registradas
                        </div>

                    </div>

                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <script th:if="${errorPermiso}">
            Swal.fire({
                icon: 'warning',
                title: 'Acceso denegado',
                text: '[[${errorPermiso}]]',
                confirmButtonColor: '#3085d6'
            });
        </script>

        <script th:if="${errorGeneral}">
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: '[[${errorGeneral}]]'
            });
        </script>

    </body>
</html>
